<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>창세기 이야기 여행</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <script src="./config.js"></script>
  <script src="./tts.js"></script>
  <script src="./sfx.js"></script>
  <script src="./recorder.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #e0e7ff 50%, #fce7f3 100%);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .scene-ghost { opacity: 0.3; }
    .scene-chosen { transform: scale(1.04); box-shadow: 0 10px 24px rgba(99,102,241,0.35); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;
    const sfx = window.GameSFX;
    const { pickVoice } = window.GameTTS || {};

    const LS_KEY = "bible-genesis-journey:progress";

    function loadProgress() {
      try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); }
      catch (e) { return {}; }
    }
    function saveProgress(p) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(p)); } catch (e) {}
    }

    function useIsMobile(bp = 640) {
      const [m, setM] = useState(() => (typeof window !== 'undefined' ? window.innerWidth < bp : false));
      useEffect(() => {
        const r = () => setM(window.innerWidth < bp);
        window.addEventListener('resize', r);
        return () => window.removeEventListener('resize', r);
      }, [bp]);
      return m;
    }

    function speakScene(scene) {
      try {
        window.speechSynthesis.cancel();
        const mk = (text, lang) => {
          const u = new SpeechSynthesisUtterance(text);
          u.lang = lang;
          u.rate = lang === 'ko-KR' ? 1.0 : 0.92;
          const v = pickVoice && pickVoice(lang);
          if (v) u.voice = v;
          return u;
        };
        window.speechSynthesis.speak(mk(scene.title, 'ko-KR'));
        if (scene.quote) window.speechSynthesis.speak(mk(scene.quote, 'ko-KR'));
      } catch (e) {}
    }

    function shuffleArr(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      if (arr.length >= 2 && a.every((x, i) => x._idx === arr[i]._idx)) return shuffleArr(arr);
      return a;
    }

    function StartScreen({ onStart }) {
      const [name, setName] = useState('');
      return (
        <div style={{ maxWidth: 480, margin: '40px auto', padding: 28, background: 'white', borderRadius: 24, boxShadow: '0 10px 30px rgba(0,0,0,0.08)', textAlign: 'center' }}>
          <div style={{ fontSize: '3.5em', marginBottom: 8 }}>📖</div>
          <h1 style={{ fontSize: '1.8em', fontWeight: 800, marginBottom: 6 }}>창세기 이야기 여행</h1>
          <p style={{ color: '#6b7280', marginBottom: 20 }}>아브라함 · 이삭 · 야곱 · 요셉의 이야기를 순서대로 맞춰봐요</p>
          <input
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="이름"
            style={{ width: '100%', padding: '16px 18px', border: '2px solid #e5e7eb', borderRadius: 14, fontSize: '1.05em', marginBottom: 14, outline: 'none', fontFamily: 'inherit' }}
          />
          <button
            disabled={!name.trim()}
            onClick={() => { sfx.click(); onStart(name.trim()); }}
            style={{ width: '100%', padding: '16px 20px', background: '#6366f1', color: 'white', border: 'none', borderRadius: 14, fontSize: '1.1em', fontWeight: 800, cursor: name.trim() ? 'pointer' : 'not-allowed', opacity: name.trim() ? 1 : 0.5, fontFamily: 'inherit' }}
          >
            여행 시작하기 🚀
          </button>
        </div>
      );
    }

    function ModuleMap({ player, modules, characters, progress, onSelect, onReset, unlockMode }) {
      const isMobile = useIsMobile();
      const completed = Object.keys(progress).filter((k) => progress[k]?.completed);

      const isUnlocked = (mod) => {
        if (unlockMode === 'free') return true;  // 모든 에피소드 자유 접근
        if (!mod.requires || mod.requires.length === 0) return true;
        return mod.requires.every((req) => progress[req]?.completed);
      };

      // 인물별로 그룹핑 (modules 순서 유지)
      const grouped = useMemo(() => {
        const map = new Map();
        modules.forEach((mod) => {
          const char = mod.character || mod.data?.character || 'unknown';
          if (!map.has(char)) map.set(char, []);
          map.get(char).push(mod);
        });
        return Array.from(map.entries()).map(([char, eps]) => ({
          char,
          meta: characters?.[char] || { title: char, icon: '📘', color: '#6366f1' },
          episodes: eps,
        }));
      }, [modules, characters]);

      return (
        <div style={{ maxWidth: 820, margin: '20px auto', padding: isMobile ? 14 : 24 }}>
          <div style={{ background: 'white', borderRadius: 20, padding: isMobile ? 18 : 24, boxShadow: '0 10px 30px rgba(0,0,0,0.08)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10, marginBottom: 10 }}>
              <div>
                <h1 style={{ fontSize: isMobile ? '1.3em' : '1.6em', fontWeight: 800 }}>📖 {player} 님, 안녕하세요!</h1>
                <p style={{ color: '#6b7280', marginTop: 4 }}>완료: <b>{completed.length}</b> / {modules.length} 에피소드</p>
              </div>
              {completed.length > 0 && (
                <button onClick={onReset} style={{ padding: '6px 14px', background: '#f3f4f6', border: '1px solid #e5e7eb', borderRadius: 18, fontSize: '0.88em', cursor: 'pointer', fontFamily: 'inherit' }}>진도 초기화</button>
              )}
            </div>

            {grouped.map(({ char, meta, episodes }) => {
              const charDone = episodes.filter((e) => progress[e.id]?.completed).length;
              return (
                <div key={char} style={{ marginTop: 22 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10, padding: '8px 12px', background: meta.color + '15', borderLeft: `4px solid ${meta.color}`, borderRadius: 8 }}>
                    <div style={{ fontSize: '1.8em' }}>{meta.icon}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: '1.15em', fontWeight: 800, color: '#1f2937' }}>{meta.title}</div>
                      <div style={{ fontSize: '0.82em', color: '#6b7280' }}>
                        {meta.description} · {charDone}/{episodes.length} 완료
                      </div>
                    </div>
                  </div>

                  <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)', gap: 10 }}>
                    {episodes.map((mod) => {
                      const done = progress[mod.id]?.completed;
                      const unlocked = isUnlocked(mod);
                      const info = mod.data;
                      const bgColor = done ? '#d1fae5' : unlocked ? '#ffffff' : '#f3f4f6';
                      const borderColor = done ? '#10b981' : unlocked ? meta.color : '#d1d5db';
                      return (
                        <button
                          key={mod.id}
                          disabled={!unlocked}
                          onClick={() => { sfx.tap(); onSelect(mod); }}
                          onTouchEnd={(e) => { if (unlocked && e.cancelable) { e.preventDefault(); sfx.tap(); onSelect(mod); } }}
                          style={{
                            textAlign: 'left', padding: 14, borderRadius: 14,
                            background: bgColor, border: `2px solid ${borderColor}`,
                            cursor: unlocked ? 'pointer' : 'not-allowed',
                            opacity: unlocked ? 1 : 0.55,
                            transition: 'all 0.2s',
                            fontFamily: 'inherit',
                          }}
                        >
                          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <div style={{ fontSize: '1.8em' }}>{info?.icon || '📘'}</div>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: '0.72em', color: '#6b7280', fontWeight: 700 }}>
                                {done ? '✅ 완료' : unlocked ? '🔓 해금' : '🔒 잠김'}
                              </div>
                              <div style={{ fontSize: '1em', fontWeight: 800 }}>
                                {info?.title || mod.id}
                              </div>
                            </div>
                          </div>
                          <div style={{ fontSize: '0.82em', color: '#4b5563', lineHeight: 1.4, marginTop: 6 }}>
                            {info?.intro || ''}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            {completed.length === modules.length && modules.length > 0 && (
              <div style={{ marginTop: 20, padding: 16, background: '#fef3c7', borderRadius: 14, textAlign: 'center' }}>
                <div style={{ fontSize: '2em' }}>🎉</div>
                <div style={{ fontWeight: 800, color: '#78350f' }}>모든 이야기를 완주했어요! 참 잘했어요!</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function PlotOrderGame({ module, player, onComplete, onBack, allModules }) {
      const isMobile = useIsMobile();
      const info = module.data;
      const scenesWithIdx = useMemo(
        () => info.scenes.map((s, i) => ({ ...s, _idx: i })),
        [info.scenes]
      );

      // "다음 이야기는?" 퀴즈 — 정답: info.next, 오답 3: 다른 에피소드에서 랜덤
      const nextQuiz = useMemo(() => {
        if (!info.next || !allModules || !allModules.length) return null;
        const nextModule = allModules.find((m) => m.id === info.next);
        if (!nextModule) return null;
        const correctTitle = nextModule.data.title;
        const pool = allModules.filter((m) => m.id !== module.id && m.id !== info.next);
        const shuffled = [...pool].sort(() => Math.random() - 0.5);
        const wrongTitles = shuffled.slice(0, 3).map((m) => m.data.title);
        const options = [correctTitle, ...wrongTitles].sort(() => Math.random() - 0.5);
        return { correct: correctTitle, options };
      }, [info.next, module.id, allModules]);

      const [quizChosen, setQuizChosen] = useState(null);
      const [quizAttempts, setQuizAttempts] = useState(0);
      const quizCorrect = quizChosen === (nextQuiz?.correct || null);

      // slots: 고정 길이 배열, 각 요소 null(빈) 또는 scene
      // pool: 가변 길이 배열 (초기 모든 카드가 섞여서)
      function freshState() {
        const shuffled = [...scenesWithIdx];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return {
          slots: Array(scenesWithIdx.length).fill(null),
          pool: shuffled,
        };
      }

      const [state, setState] = useState(freshState);
      const [selectedKey, setSelectedKey] = useState(null);  // 선택된 scene의 _idx
      const [checked, setChecked] = useState(false);
      const [hintsUsed, setHintsUsed] = useState(0);
      const [showEpilogue, setShowEpilogue] = useState(false);
      const [showRefs, setShowRefs] = useState(false);
      const [startTime] = useState(() => Date.now());

      const filledCount = state.slots.filter(Boolean).length;
      const correctCount = state.slots.reduce((acc, s, i) => acc + (s && s._idx === i ? 1 : 0), 0);
      const allFilled = filledCount === scenesWithIdx.length;
      const allCorrect = allFilled && correctCount === scenesWithIdx.length;

      // 카드 선택 (풀에서든 슬롯에서든)
      function handleCardTap(scene) {
        if (checked) return;
        sfx.tap();
        if (selectedKey === scene._idx) {
          setSelectedKey(null);
        } else {
          setSelectedKey(scene._idx);
        }
      }

      // 슬롯 자리 탭 (placeholder 또는 카드 위)
      function handleSlotTap(slotIdx) {
        if (checked) return;
        const cur = state.slots[slotIdx];

        // 선택된 카드가 없으면 이 슬롯의 카드 선택 또는 아무것도 안 함
        if (selectedKey === null) {
          if (cur) {
            sfx.tap();
            setSelectedKey(cur._idx);
          }
          return;
        }

        // 선택된 카드를 이 슬롯으로 이동
        sfx.click();
        setState((prev) => {
          const slots = [...prev.slots];
          const pool = [...prev.pool];
          const selectedIdx = selectedKey;

          // 선택 카드가 어디에 있는지
          const fromSlot = slots.findIndex((s) => s && s._idx === selectedIdx);
          const poolIdx = pool.findIndex((s) => s._idx === selectedIdx);

          let card = null;
          if (fromSlot >= 0) { card = slots[fromSlot]; slots[fromSlot] = null; }
          else if (poolIdx >= 0) { card = pool[poolIdx]; pool.splice(poolIdx, 1); }

          if (!card) return prev;

          // 대상 슬롯에 기존 카드가 있으면
          if (cur) {
            if (fromSlot >= 0) {
              // 슬롯 ↔ 슬롯 swap
              slots[fromSlot] = cur;
            } else {
              // 풀 → 슬롯: 대상 카드 풀로
              pool.push(cur);
            }
          }
          slots[slotIdx] = card;
          return { slots, pool };
        });
        setSelectedKey(null);
      }

      // 풀 영역 탭 → 선택 해제 또는 선택된 슬롯 카드를 풀로 돌려보냄
      function handlePoolAreaTap() {
        if (checked) return;
        if (selectedKey !== null) {
          // 만약 선택된 카드가 슬롯에 있으면 풀로 복귀
          const fromSlot = state.slots.findIndex((s) => s && s._idx === selectedKey);
          if (fromSlot >= 0) {
            sfx.click();
            setState((prev) => {
              const slots = [...prev.slots];
              const pool = [...prev.pool];
              const card = slots[fromSlot];
              slots[fromSlot] = null;
              pool.push(card);
              return { slots, pool };
            });
          }
          setSelectedKey(null);
        }
      }

      function check() {
        if (!allFilled) return;
        sfx.click();
        setChecked(true);
        setTimeout(() => {
          if (allCorrect) sfx.correct();
          else if (correctCount >= scenesWithIdx.length - 1) sfx.partial();
          else sfx.wrong();
        }, 80);
      }

      function useHint() {
        if (checked) return;
        // 틀리거나 빈 슬롯 찾기
        const wrongIdxs = state.slots.map((s, i) => {
          if (!s) return i;
          return s._idx !== i ? i : -1;
        }).filter((i) => i >= 0);
        if (!wrongIdxs.length) return;
        const targetPos = wrongIdxs[Math.floor(Math.random() * wrongIdxs.length)];
        const correctScene = scenesWithIdx[targetPos];
        setState((prev) => {
          const slots = [...prev.slots];
          const pool = [...prev.pool];
          // correctScene 위치 찾기
          const slotIdx = slots.findIndex((s) => s && s._idx === correctScene._idx);
          const poolIdx = pool.findIndex((s) => s._idx === correctScene._idx);
          const curAtTarget = slots[targetPos];
          if (slotIdx >= 0) {
            slots[slotIdx] = curAtTarget;  // 스왑
          } else if (poolIdx >= 0) {
            pool.splice(poolIdx, 1);
            if (curAtTarget) pool.push(curAtTarget);
          }
          slots[targetPos] = correctScene;
          return { slots, pool };
        });
        setHintsUsed((h) => h + 1);
        sfx.click();
      }

      function reshuffle() {
        sfx.click();
        setSelectedKey(null);
        setState(freshState());
        setChecked(false);
      }

      // 에필로그 열릴 때 자동 TTS · 닫힐 때 중단
      function speakEpilogue() {
        try {
          window.speechSynthesis.cancel();
          // 한글 제목 사용 (info.character는 영어 ID이므로 피함)
          const u = new SpeechSynthesisUtterance(`${info.title} 이야기를 마쳤어요. ${info.epilogue}`);
          u.lang = 'ko-KR';
          u.rate = 1.0;
          const v = pickVoice && pickVoice('ko-KR');
          if (v) u.voice = v;
          window.speechSynthesis.speak(u);
        } catch (e) {}
      }
      useEffect(() => {
        if (showEpilogue) {
          // 약간 지연 후 재생 (화면 전환 애니메이션 끝난 뒤)
          const t = setTimeout(speakEpilogue, 350);
          return () => { clearTimeout(t); try { window.speechSynthesis.cancel(); } catch (e) {} };
        }
      }, [showEpilogue]);

      function goEpilogue() {
        sfx.click();
        setShowEpilogue(true);
      }

      function finish() {
        sfx.finish();
        const duration = Math.round((Date.now() - startTime) / 1000);
        onComplete({
          moduleId: module.id,
          score: correctCount,
          total: scenesWithIdx.length,
          duration_sec: duration,
          hints_used: hintsUsed,
          answers: state.slots.map((it, i) => ({
            position: i + 1,
            expected: scenesWithIdx[i].title,
            chosen: it.type === 'card' ? it.scene.title : '(빈 칸)',
            ok: it.type === 'card' && it.scene._idx === i,
          })),
        });
      }

      if (showEpilogue) {
        const needQuiz = nextQuiz && !quizCorrect;
        return (
          <div style={{ maxWidth: 560, margin: '40px auto', padding: isMobile ? 20 : 30, background: 'white', borderRadius: 24, boxShadow: '0 20px 60px rgba(0,0,0,0.12)' }}>
            <div style={{ fontSize: '4em', textAlign: 'center' }}>{info.icon}</div>
            <h2 style={{ fontSize: '1.6em', fontWeight: 800, textAlign: 'center', marginBottom: 14 }}>{info.title} 이야기를 마쳤어요! 🎉</h2>

            {/* 교훈 — 항상 먼저 보이게 */}
            <div style={{ padding: 18, background: '#fef9c3', borderRadius: 14, lineHeight: 1.7, color: '#713f12', marginBottom: 18, position: 'relative' }}>
              <button
                onClick={speakEpilogue}
                onTouchEnd={(e) => { if (e.cancelable) e.preventDefault(); speakEpilogue(); }}
                style={{
                  position: 'absolute', top: 10, right: 10,
                  width: 36, height: 36, borderRadius: '50%',
                  background: '#fde68a', border: 'none', cursor: 'pointer',
                  fontSize: 14, boxShadow: '0 2px 6px rgba(0,0,0,0.1)',
                }}
                title="교훈 다시 듣기"
              >🔊</button>
              💡 {info.epilogue}
            </div>

            {/* 깜짝 퀴즈 — 교훈 아래 */}
            {nextQuiz && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ padding: 14, background: '#eef2ff', borderRadius: 14, marginBottom: 12, textAlign: 'center' }}>
                  <div style={{ fontSize: '0.9em', fontWeight: 700, color: '#4338ca', marginBottom: 4 }}>🧠 깜짝 퀴즈!</div>
                  <div style={{ fontSize: '1.1em', fontWeight: 800, color: '#1e293b' }}>다음 이야기는 무엇일까요?</div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)', gap: 10, marginBottom: 12 }}>
                  {nextQuiz.options.map((opt) => {
                    const chosen = quizChosen === opt;
                    const isCorrectOpt = opt === nextQuiz.correct;
                    const showResult = chosen || (quizCorrect && isCorrectOpt);
                    const bg = !showResult ? 'white' : isCorrectOpt ? '#d1fae5' : '#fee2e2';
                    const border = !showResult ? '#c7d2fe' : isCorrectOpt ? '#10b981' : '#ef4444';
                    return (
                      <button
                        key={opt}
                        onClick={() => {
                          if (quizCorrect) return;
                          sfx.tap();
                          setQuizChosen(opt);
                          setQuizAttempts((n) => n + 1);
                          setTimeout(() => {
                            if (opt === nextQuiz.correct) sfx.correct();
                            else sfx.wrong();
                          }, 60);
                        }}
                        onTouchEnd={(e) => { if (e.cancelable) e.preventDefault(); if (!quizCorrect) { sfx.tap(); setQuizChosen(opt); setQuizAttempts((n) => n + 1); setTimeout(() => { if (opt === nextQuiz.correct) sfx.correct(); else sfx.wrong(); }, 60); } }}
                        disabled={quizCorrect}
                        style={{
                          padding: '14px 12px', borderRadius: 12,
                          background: bg, border: `2px solid ${border}`,
                          fontSize: '0.96em', fontWeight: 700, cursor: quizCorrect ? 'default' : 'pointer',
                          textAlign: 'left', fontFamily: 'inherit',
                          transition: 'all 0.2s',
                        }}
                      >
                        {opt}
                      </button>
                    );
                  })}
                </div>
                {quizChosen && !quizCorrect && (
                  <div style={{ padding: 10, background: '#fef3c7', borderRadius: 10, fontSize: '0.88em', color: '#92400e', textAlign: 'center' }}>
                    ❌ 다시 생각해봐요.
                    <button
                      onClick={() => { sfx.click(); setQuizChosen(null); }}
                      onTouchEnd={(e) => { if (e.cancelable) e.preventDefault(); sfx.click(); setQuizChosen(null); }}
                      style={{ marginLeft: 8, padding: '4px 12px', borderRadius: 14, border: 'none', background: '#f59e0b', color: 'white', fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', fontSize: '0.88em' }}
                    >다시 고르기</button>
                  </div>
                )}
                {quizCorrect && (
                  <div style={{ padding: 10, background: '#d1fae5', borderRadius: 10, fontSize: '0.9em', color: '#065f46', textAlign: 'center', fontWeight: 700 }}>
                    ✅ 정답! 바로 이어지는 이야기예요.
                  </div>
                )}
              </div>
            )}

            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
              <button
                onClick={finish}
                disabled={needQuiz}
                style={{
                  flex: 1, padding: '16px 20px',
                  background: needQuiz ? '#d1d5db' : '#10b981',
                  color: 'white', border: 'none', borderRadius: 14,
                  fontSize: '1.05em', fontWeight: 800,
                  cursor: needQuiz ? 'not-allowed' : 'pointer',
                  fontFamily: 'inherit',
                }}
                title={needQuiz ? '깜짝 퀴즈를 먼저 맞춰보세요' : ''}
              >
                {info.next ? (needQuiz ? '🔒 먼저 퀴즈를 맞춰요' : '다음 이야기로 →') : '✅ 여행 완주!'}
              </button>
            </div>
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 800, margin: '14px auto', padding: isMobile ? 10 : 20 }}>
          <div style={{ background: 'white', borderRadius: 18, padding: isMobile ? 16 : 22, marginBottom: 14, boxShadow: '0 6px 18px rgba(0,0,0,0.06)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ fontSize: '2em' }}>{info.icon}</div>
                <div>
                  <h2 style={{ fontSize: isMobile ? '1.1em' : '1.3em', fontWeight: 800 }}>{info.title}</h2>
                  <p style={{ fontSize: '0.86em', color: '#6b7280' }}>🙋 {player}</p>
                </div>
              </div>
              <button onClick={onBack} style={{ padding: '6px 14px', background: '#f3f4f6', border: '1px solid #e5e7eb', borderRadius: 18, fontSize: '0.88em', cursor: 'pointer', fontFamily: 'inherit' }}>← 목록으로</button>
            </div>
            <p style={{ marginTop: 10, color: '#4b5563' }}>{info.intro}</p>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 10 }}>
              <button
                onClick={() => { sfx.click(); setShowRefs((v) => !v); }}
                style={{
                  padding: '6px 12px', borderRadius: 18, border: '1px solid #c7d2fe',
                  background: showRefs ? '#eef2ff' : 'white', color: '#4338ca',
                  fontSize: '0.82em', fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                }}
              >
                📖 성경 구절 {showRefs ? '숨기기' : '보기'}
              </button>
              <span style={{ fontSize: '0.78em', color: '#9ca3af' }}>
                {showRefs ? '힌트 ON (창세기 장/절 표시)' : '힌트 OFF (먼저 맞춰봐요)'}
              </span>
            </div>
            {checked && (
              <div style={{ marginTop: 12, padding: 12, borderRadius: 12, fontWeight: 700,
                background: allCorrect ? '#d1fae5' : correctCount >= scenesWithIdx.length - 1 ? '#fef3c7' : '#fee2e2' }}>
                {allCorrect ? '🎉 전부 맞았어요!' : `✏️ ${correctCount}/${scenesWithIdx.length} 맞음 — 빨간 자리를 다시 옮겨보세요.`}
              </div>
            )}
            {!checked && (
              <div style={{ marginTop: 10, padding: '8px 12px', background: '#eef2ff', borderRadius: 10, fontSize: '0.84em', color: '#4338ca' }}>
                👉 <b>카드를 탭</b>해서 선택 → <b>빈 자리를 탭</b>해서 놓아요. 슬롯 카드를 다시 탭하면 풀로 돌아가요.
              </div>
            )}
          </div>

          {/* 상단: 순서 슬롯 — 항상 한 줄 (1-2-3-4) */}
          <div style={{ background: 'rgba(255,255,255,0.6)', border: '2px dashed #c7d2fe', borderRadius: 18, padding: isMobile ? 10 : 14, marginBottom: 14 }}>
            <div style={{ fontSize: '0.82em', fontWeight: 700, color: '#4338ca', marginBottom: 10, textAlign: 'center' }}>
              ⬇ 순서대로 놓을 자리 (왼쪽 → 오른쪽)
            </div>
            <div
              style={{
                display: 'grid',
                gridTemplateColumns: `repeat(${scenesWithIdx.length}, 1fr)`,
                gap: isMobile ? 6 : 10,
                alignItems: 'stretch',
              }}
            >
              {state.slots.map((scene, i) => (
                <MiniSlot
                  key={`slot-${i}`}
                  scene={scene}
                  slotIndex={i}
                  checked={checked}
                  isMobile={isMobile}
                  color={info.color}
                  selectedKey={selectedKey}
                  onTap={() => handleSlotTap(i)}
                />
              ))}
            </div>
            {/* 화살표 연결선 — 흐름 강조 */}
            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${scenesWithIdx.length * 2 - 1}, 1fr)`, alignItems: 'center', marginTop: 4, opacity: 0.4 }}>
              {Array.from({ length: scenesWithIdx.length * 2 - 1 }).map((_, i) => (
                <div key={i} style={{ textAlign: 'center', color: '#6366f1', fontSize: '0.7em' }}>
                  {i % 2 === 0 ? '' : '→'}
                </div>
              ))}
            </div>
          </div>

          {/* 하단: 카드 풀 (전체 내용) */}
          <div
            style={{ background: 'rgba(254, 243, 199, 0.6)', border: '2px solid #fde68a', borderRadius: 18, padding: isMobile ? 12 : 16 }}
            onClick={(e) => { if (e.target === e.currentTarget) handlePoolAreaTap(); }}
          >
            <div style={{ fontSize: '0.82em', fontWeight: 700, color: '#92400e', marginBottom: 10, textAlign: 'center' }}>
              🃏 카드 풀 — 탭해서 선택 → 위쪽 자리 탭해서 놓기
              {selectedKey !== null && ' · (여기 탭하면 선택 해제)'}
            </div>
            {state.pool.length > 0 ? (
              <div
                style={{
                  display: 'grid',
                  gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : `repeat(${scenesWithIdx.length}, 1fr)`,
                  gap: isMobile ? 10 : 12,
                  alignItems: 'stretch',
                }}
              >
                {state.pool.map((scene) => (
                  <SlotCard
                    key={`pool-${scene._idx}`}
                    scene={scene}
                    slotIndex={-1}
                    checked={checked}
                    showRefs={showRefs}
                    isMobile={isMobile}
                    color={info.color}
                    selectedKey={selectedKey}
                    inPool
                    onTap={() => handleCardTap(scene)}
                  />
                ))}
              </div>
            ) : (
              <div style={{ textAlign: 'center', padding: 20, color: '#92400e', fontSize: '0.9em' }}>
                ✨ 모든 카드가 자리에 있어요!
              </div>
            )}
          </div>

          <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap', marginTop: 18 }}>
            {!checked ? (
              <>
                <button onClick={reshuffle} style={btnStyle('#94a3b8')}>🔀 다시 섞기</button>
                <button onClick={useHint} style={btnStyle('#f59e0b')}>💡 힌트 ({hintsUsed}회)</button>
                <button
                  onClick={check}
                  disabled={!allFilled}
                  style={{ ...btnStyle('#6366f1'), opacity: allFilled ? 1 : 0.4, cursor: allFilled ? 'pointer' : 'not-allowed' }}
                  title={allFilled ? '' : '빈 자리를 모두 채워주세요'}
                >
                  ✅ 정답 확인 {!allFilled && `(${filledCount}/${scenesWithIdx.length})`}
                </button>
              </>
            ) : allCorrect ? (
              <button onClick={goEpilogue} style={btnStyle('#10b981')}>📖 이야기 교훈 듣기 →</button>
            ) : (
              <>
                <button onClick={() => { sfx.click(); setChecked(false); }} style={btnStyle('#f59e0b')}>✏️ 다시 고치기</button>
                <button onClick={goEpilogue} style={btnStyle('#6b7280')}>여기서 끝내기</button>
              </>
            )}
          </div>
        </div>
      );
    }

    // 미니 슬롯: 상단 한 줄용 (번호 + 이모지만, 좁은 폰에서도 4개 한 줄)
    function MiniSlot({ scene, slotIndex, checked, isMobile, color, selectedKey, onTap }) {
      const isEmpty = !scene;
      const isSelected = !isEmpty && selectedKey === scene._idx;
      const ok = checked && !isEmpty && scene._idx === slotIndex;
      const wrong = checked && !isEmpty && scene._idx !== slotIndex;

      const tapHandlers = {
        onClick: onTap,
        onTouchEnd: (e) => { if (e.cancelable) e.preventDefault(); onTap(); },
      };

      const bg = ok ? '#d1fae5' : wrong ? '#fee2e2' : isSelected ? '#fef3c7' : isEmpty ? 'rgba(199,210,254,0.2)' : 'white';
      const border = ok ? '#10b981' : wrong ? '#ef4444' : isSelected ? '#f59e0b' : isEmpty ? '#a5b4fc' : '#e5e7eb';

      return (
        <div
          {...tapHandlers}
          style={{
            background: bg,
            border: `${isEmpty ? '2px dashed' : '3px solid'} ${border}`,
            borderRadius: 12,
            padding: isMobile ? '18px 4px 8px' : '22px 8px 10px',
            minHeight: isMobile ? 80 : 100,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            position: 'relative',
            cursor: checked ? 'default' : 'pointer',
            userSelect: 'none',
            transition: 'all 0.15s',
            boxShadow: isSelected ? '0 0 0 3px rgba(245,158,11,0.3)' : 'none',
            transform: isSelected ? 'translateY(-3px)' : 'none',
          }}
        >
          {/* 번호 배지 */}
          <div style={{
            position: 'absolute', top: -12, left: '50%', transform: 'translateX(-50%)',
            width: isMobile ? 28 : 32, height: isMobile ? 28 : 32, borderRadius: '50%',
            background: ok ? '#10b981' : wrong ? '#ef4444' : (color || '#6366f1'),
            color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: isMobile ? '0.8em' : '0.9em', fontWeight: 800,
            boxShadow: '0 3px 8px rgba(0,0,0,0.15)',
          }}>{slotIndex + 1}</div>

          {isEmpty ? (
            <div style={{ fontSize: isMobile ? '1.4em' : '1.6em', opacity: 0.45 }}>⬚</div>
          ) : scene.img ? (
            <img
              src={scene.img}
              alt={scene.title}
              draggable={false}
              style={{
                width: '100%', maxHeight: isMobile ? 54 : 70, objectFit: 'cover',
                borderRadius: 6, pointerEvents: 'none',
              }}
            />
          ) : (
            <div style={{ fontSize: isMobile ? '2em' : '2.4em', lineHeight: 1 }}>
              {scene.emoji}
            </div>
          )}
        </div>
      );
    }

    // 카드/빈자리 공용 컴포넌트 (scene=null이면 placeholder)
    function SlotCard({ scene, slotIndex, checked, showRefs, isMobile, color, inPool, selectedKey, onTap }) {
      const isEmpty = !scene;
      const isSelected = !isEmpty && selectedKey === scene._idx;
      const ok = checked && !isEmpty && !inPool && scene._idx === slotIndex;
      const wrong = checked && !isEmpty && !inPool && scene._idx !== slotIndex;

      const tapHandlers = {
        onClick: onTap,
        onTouchEnd: (e) => { if (e.cancelable) e.preventDefault(); onTap(); },
      };

      if (isEmpty) {
        // 빈 슬롯
        return (
          <div
            {...tapHandlers}
            style={{
              background: 'rgba(199,210,254,0.15)',
              border: '2px dashed #a5b4fc',
              borderRadius: 16, padding: isMobile ? 12 : 14,
              minHeight: isMobile ? 170 : 220,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              position: 'relative',
              color: '#6366f1',
              cursor: checked ? 'default' : 'pointer',
              userSelect: 'none',
              transition: 'all 0.15s',
            }}
          >
            {slotIndex >= 0 && (
              <div style={{
                position: 'absolute', top: -14, left: '50%', transform: 'translateX(-50%)',
                width: 36, height: 36, borderRadius: '50%',
                background: color || '#6366f1',
                color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '0.95em', fontWeight: 800, boxShadow: '0 3px 8px rgba(0,0,0,0.15)',
              }}>{slotIndex + 1}</div>
            )}
            <div style={{ fontSize: isMobile ? '1.8em' : '2em', opacity: 0.45, marginTop: 10 }}>⬚</div>
            <div style={{ fontSize: '0.8em', marginTop: 6, fontWeight: 700 }}>
              {slotIndex + 1}번 자리
            </div>
          </div>
        );
      }

      return (
        <div
          {...tapHandlers}
          style={{
            background: ok ? '#d1fae5' : wrong ? '#fee2e2' : isSelected ? '#fef3c7' : 'white',
            border: '3px solid ' + (ok ? '#10b981' : wrong ? '#ef4444' : isSelected ? '#f59e0b' : '#e5e7eb'),
            borderRadius: 16, padding: isMobile ? 12 : 14,
            cursor: checked ? 'default' : 'pointer', userSelect: 'none',
            boxShadow: isSelected ? '0 0 0 4px rgba(245,158,11,0.25), 0 6px 16px rgba(245,158,11,0.25)' : '0 4px 12px rgba(0,0,0,0.06)',
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            textAlign: 'center', minHeight: isMobile ? 190 : 240,
            position: 'relative',
            transition: 'all 0.15s',
            transform: isSelected ? 'translateY(-3px)' : 'none',
          }}
        >
          {!inPool && slotIndex >= 0 && (
            <div style={{
              position: 'absolute', top: -14, left: '50%', transform: 'translateX(-50%)',
              width: 36, height: 36, borderRadius: '50%',
              background: ok ? '#10b981' : wrong ? '#ef4444' : (color || '#6366f1'),
              color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '0.95em', fontWeight: 800, boxShadow: '0 3px 8px rgba(0,0,0,0.15)',
            }}>{slotIndex + 1}</div>
          )}

          {scene.img ? (
            <img
              src={scene.img}
              alt={scene.title}
              draggable={false}
              style={{
                width: '100%', maxHeight: isMobile ? 120 : 150, objectFit: 'cover',
                borderRadius: 10, marginTop: (!inPool && slotIndex >= 0) ? 14 : 4, marginBottom: 8,
                pointerEvents: 'none',
              }}
            />
          ) : (
            <div style={{ fontSize: isMobile ? '2.4em' : '2.8em', lineHeight: 1, marginTop: (!inPool && slotIndex >= 0) ? 14 : 4, marginBottom: 8 }}>
              {scene.emoji}
            </div>
          )}
          <div style={{ fontSize: isMobile ? '0.92em' : '1em', fontWeight: 800, marginBottom: 6, color: '#1f2937' }}>
            {scene.title}
          </div>
          {scene.quote && (
            <div style={{ fontSize: isMobile ? '0.78em' : '0.82em', color: '#6b7280', lineHeight: 1.4, marginBottom: 8, flex: 1 }}>
              "{scene.quote}"
            </div>
          )}
          {showRefs && scene.ref && (
            <div style={{ fontSize: '0.72em', color: '#4338ca', background: '#eef2ff', padding: '3px 10px', borderRadius: 10, marginBottom: 8 }}>
              {scene.ref}
            </div>
          )}
          <button
            onClick={(e) => { e.stopPropagation(); speakScene(scene); }}
            onTouchEnd={(e) => { e.stopPropagation(); if (e.cancelable) e.preventDefault(); speakScene(scene); }}
            style={{
              marginTop: 'auto', width: 36, height: 36, borderRadius: '50%',
              background: '#eef2ff', border: 'none', cursor: 'pointer', fontSize: 14,
            }}
            title="이 장면 듣기"
          >🔊</button>
        </div>
      );
    }

    function btnStyle(color) {
      return { padding: '13px 20px', fontSize: '1em', fontWeight: 800, color: 'white',
               background: color, border: 'none', borderRadius: 14, cursor: 'pointer',
               boxShadow: '0 6px 14px rgba(0,0,0,0.12)', fontFamily: 'inherit' };
    }

    function App() {
      const [player, setPlayer] = useState(() => localStorage.getItem(LS_KEY + ":player") || '');
      const [modulesConfig, setModulesConfig] = useState(null);
      const [modules, setModules] = useState([]);
      const [characters, setCharacters] = useState({});
      const [currentModule, setCurrentModule] = useState(null);
      const [progress, setProgress] = useState(() => loadProgress());

      useEffect(() => {
        (async () => {
          try {
            const cfgResp = await fetch('./modules.json');
            const cfg = await cfgResp.json();
            setModulesConfig(cfg);
            // 인물 메타 로드 (있으면)
            if (cfg.charactersPath) {
              try {
                const cr = await fetch('./assets/' + cfg.charactersPath);
                const cdata = await cr.json();
                setCharacters(cdata);
              } catch (e) { console.warn('characters.json load failed', e); }
            }
            const loaded = await Promise.all(cfg.modules.map(async (m) => {
              const r = await fetch('./assets/' + m.path);
              const data = await r.json();
              return { id: m.id, kind: m.kind || data.kind, character: m.character || data.character, path: m.path, data, requires: data.requires || [] };
            }));
            setModules(loaded);
          } catch (e) {
            console.error('Failed to load modules:', e);
          }
        })();
      }, []);

      function onStart(name) {
        setPlayer(name);
        try { localStorage.setItem(LS_KEY + ":player", name); } catch (e) {}
      }

      function onSelect(mod) {
        setCurrentModule(mod);
      }

      function onBack() {
        sfx.click();
        setCurrentModule(null);
      }

      function onComplete(result) {
        const updated = { ...progress, [result.moduleId]: { completed: true, score: result.score, total: result.total, ts: Date.now() } };
        setProgress(updated);
        saveProgress(updated);
        try {
          window.GameRecorder.submit({
            player,
            score: result.score,
            total: result.total,
            duration_sec: result.duration_sec,
            answers: result.answers,
            meta: {
              moduleId: result.moduleId,
              moduleKind: currentModule?.kind,
              hints_used: result.hints_used,
              character: currentModule?.data?.character,
            },
          });
        } catch (e) {}
        setCurrentModule(null);
      }

      function onReset() {
        if (!confirm('모든 진도를 초기화할까요? (이미 완료한 이야기도 다시 풀어야 해요)')) return;
        setProgress({});
        saveProgress({});
        sfx.click();
      }

      if (!player) return <StartScreen onStart={onStart} />;
      if (!modulesConfig) {
        return <div style={{ textAlign: 'center', padding: 60, color: '#6b7280' }}>불러오는 중…</div>;
      }
      if (currentModule) {
        const charMeta = characters[currentModule.character] || {};
        const enrichedModule = { ...currentModule, data: { ...currentModule.data, color: currentModule.data.color || charMeta.color } };
        return <PlotOrderGame module={enrichedModule} player={player} onComplete={onComplete} onBack={onBack} allModules={modules} />;
      }
      return (
        <ModuleMap
          player={player}
          modules={modules}
          characters={characters}
          progress={progress}
          onSelect={onSelect}
          onReset={onReset}
          unlockMode={modulesConfig?.unlockMode || 'linear'}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
